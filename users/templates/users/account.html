{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center my-5">
    <div class="col-md-8">
        <div class="card border-0 shadow-sm overflow-hidden">
            <div class="card-header bg-dark text-white p-4 d-flex align-items-center">
                <img src="{{ url_for('static', filename='profile_pics/' + current_user.image_file) }}" class="rounded-circle border border-2 border-danger me-3 shadow" style="width: 90px; height: 90px; object-fit: cover;">
                <div>
                    <h3 class="fw-bold mb-0 text-white">{{ current_user.nickname or current_user.username }}</h3>
                    <p class="mb-0 text-secondary">แก้ไขข้อมูลส่วนตัวของคุณ</p>
                </div>
            </div>
            <div class="card-body p-4 p-lg-5">
                <form method="POST" enctype="multipart/form-data">
                    <div class="row mb-4">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold small">ชื่อเล่น</label>
                            <input type="text" name="nickname" class="form-control" value="{{ current_user.nickname or '' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold small">ชื่อจริง-นามสกุล</label>
                            <input type="text" name="full_name" class="form-control" value="{{ current_user.full_name or '' }}">
                        </div>
                    </div>
                    <div class="row mb-4">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold small">Username</label>
                            <input type="text" name="username" class="form-control" value="{{ current_user.username }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold small">อีเมล</label>
                            <input type="email" name="email" class="form-control" value="{{ current_user.email }}" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold small">เปลี่ยนรูปโปรไฟล์</label>
                        <input type="file" name="image_file" class="form-control">
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold small">แนะนำตัวสั้นๆ</label>
                        <textarea name="bio" class="form-control" rows="3">{{ current_user.bio or '' }}</textarea>
                    </div>
                    <div class="text-end">
                        <button type="submit" class="btn btn-danger px-5 fw-bold shadow-sm">บันทึกข้อมูล</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
