{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center my-5">
    <div class="col-md-5">
        <div class="card border-0 shadow-sm p-4 text-center">
            <i class="bi bi-person-plus text-danger mb-3" style="font-size: 3rem;"></i>
            <h2 class="fw-bold mb-4">สร้างบัญชี JWI</h2>
            <form method="POST">
                <div class="mb-3 text-start">
                    <label class="form-label fw-bold small">ชื่อผู้ใช้</label>
                    <input type="text" name="username" class="form-control border-2" placeholder="Username" required>
                </div>
                <div class="mb-3 text-start">
                    <label class="form-label fw-bold small">อีเมล</label>
                    <input type="email" name="email" class="form-control border-2" placeholder="email@example.com" required>
                </div>
                <div class="mb-3 text-start">
                    <label class="form-label fw-bold small">รหัสผ่าน</label>
                    <input type="password" name="password" class="form-control border-2" placeholder="Password" required>
                </div>
                <div class="mb-4 text-start">
                    <label class="form-label fw-bold small">ยืนยันรหัสผ่าน</label>
                    <input type="password" name="confirm_password" class="form-control border-2" placeholder="Confirm Password" required>
                </div>
                <button type="submit" class="btn btn-red w-100 py-2 fw-bold shadow-sm">
                    <i class="bi bi-check-circle me-1"></i> สมัครสมาชิก
                </button>
            </form>
            <p class="small text-muted mt-4">มีบัญชีอยู่แล้ว? <a href="{{ url_for('users.login') }}" class="text-danger fw-bold">เข้าสู่ระบบ</a></p>
        </div>
    </div>
</div>
{% endblock %}
