{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center my-5">
    <div class="col-md-7">
        <div class="card border-0 shadow p-4 p-lg-5">
            <h2 class="fw-bold text-danger mb-4"><i class="bi bi-pencil-square me-2"></i>แก้ไขข้อมูลหนัง</h2>
            <form method="POST" enctype="multipart/form-data">
                <div class="mb-3">
                    <label class="form-label fw-bold small">ชื่อหนัง</label>
                    <input type="text" name="title" class="form-control" value="{{ movie.title }}" required>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold small">ประเภท</label>
                        <input type="text" name="genre" class="form-control" value="{{ movie.genre }}">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold small">คะแนน (0-10)</label>
                        <input type="number" name="rating" step="0.1" class="form-control" value="{{ movie.rating }}">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold small">เปลี่ยนหน้าปกหนัง (ปล่อยว่างถ้าไม่เปลี่ยน)</label>
                    <input type="file" name="image_file" class="form-control">
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold small">บันทึกเพิ่มเติม</label>
                    <textarea name="note" class="form-control" rows="5">{{ movie.note }}</textarea>
                </div>
                <div class="d-grid gap-2 d-md-flex justify-content-md-end pt-3">
                    <a href="{{ url_for('movies.movie_detail', movie_id=movie.id) }}" class="btn btn-light px-4">ยกเลิก</a>
                    <button type="submit" class="btn btn-red px-5 fw-bold shadow">บันทึกการเปลี่ยนแปลง</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
