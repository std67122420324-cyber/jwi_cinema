{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center my-5">
    <div class="col-md-7">
        <div class="card border-0 shadow p-4 p-lg-5">
            <h2 class="fw-bold text-danger mb-4">
                <i class="bi bi-plus-square-fill me-2"></i>เพิ่มหนังเรื่องใหม่
            </h2>
            
            <form method="POST" enctype="multipart/form-data">
                <div class="mb-3">
                    <label class="form-label fw-bold small">ชื่อหนัง (Title)</label>
                    <input type="text" name="title" class="form-control" placeholder="เช่น Inception, The Matrix" required>
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold small">ประเภท (Genre)</label>
                        <input type="text" name="genre" class="form-control" placeholder="เช่น Action, Sci-Fi, Drama">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold small">คะแนน (Rating: 0-10)</label>
                        <input type="number" name="rating" step="0.1" min="0" max="10" class="form-control" placeholder="เช่น 8.5">
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-bold small">อัปโหลดหน้าปกหนัง</label>
                    <input type="file" name="image_file" class="form-control">
                    <div class="form-text">รองรับไฟล์ .jpg หรือ .png (ถ้าไม่ใส่จะมีรูปเริ่มต้นให้)</div>
                </div>
                
                <div class="mb-4">
                    <label class="form-label fw-bold small">บันทึก/ความรู้สึกหลังดู (Note)</label>
                    <textarea name="note" class="form-control" rows="5" placeholder="คุณรู้สึกยังไงกับหนังเรื่องนี้? พิมพ์เก็บไว้ได้เลย..."></textarea>
                </div>
                
                <div class="d-grid gap-2 d-md-flex justify-content-md-end pt-3 border-top">
                    <a href="{{ url_for('core.index') }}" class="btn btn-light px-4">ยกเลิก</a>
                    <button type="submit" class="btn btn-red px-5 fw-bold shadow">
                        <i class="bi bi-save me-1"></i> บันทึกหนังใหม่
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
